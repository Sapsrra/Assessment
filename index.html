<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a1f14">
<title>Referee Assessment System</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
  :root{
    --bg:#0a1f14; --panel:#102b1c; --panel-2:#163a24; --border:#22512f;
    --accent:#ffc233; --accent-ink:#1a1305; --accent-2:#1f9d55; --text:#eef6ee; --text-dim:#9fc2a8;
    --danger:#e2574c; --good:#2bbf6b; --mid:#ffc233; --bad:#e2574c; --radius:12px;
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#f5f8f3; --panel:#ffffff; --panel-2:#eef6ec; --border:#d3e3d1;
      --accent:#b8860b; --accent-ink:#ffffff; --accent-2:#1f9d55; --text:#152017; --text-dim:#5d7264;
      --danger:#c0392b; --good:#1f9d55; --mid:#b8860b; --bad:#c0392b;
    }
  }
  body { margin:0; padding:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background:var(--bg); color:var(--text); }
  
  /* Layout & Nav */
  header { padding: 15px 20px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .tabs { display: flex; gap: 10px; }
  .tab-btn { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); padding: 8px 16px; border-radius: var(--radius); cursor: pointer; }
  .tab-btn.active { background: var(--accent); color: var(--accent-ink); font-weight: bold; }
  
  main { padding: 20px; max-width: 1200px; margin: 0 auto; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Buttons */
  button { font-family: inherit; cursor: pointer; border: none; border-radius: 6px; padding: 10px 15px; font-weight: bold; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-mid { background: var(--mid); color: #000; }
  .btn-good { background: var(--good); color: #fff; }
  .btn-accent { background: var(--accent); color: var(--accent-ink); }
  
  /* Modals */
  .modal { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
  .modal-content { background: var(--panel); padding: 25px; border-radius: var(--radius); width: 90%; max-width: 400px; border: 1px solid var(--border); }
  .modal-content h3 { margin-top: 0; }
  .modal-content select, .modal-content input, .modal-content textarea { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }

  /* Notation specific */
  .notation-buttons { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .event-options { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
  .event-options label { display: flex; align-items: center; gap: 5px; font-weight: bold; }

  /* Toast */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--accent-ink); padding: 10px 20px; border-radius: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; font-weight: bold; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h2>Referee Assessment</h2>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('tab-notation')">Notation</button>
    </div>
</header>

<main>
  <div id="tab-notation" class="tab-content active">
    
    <div class="notation-buttons">
      <button class="btn-danger" onclick="openEventModal('Penalty')">Penalty</button>
      <button class="btn-mid" onclick="openEventModal('Free Kick')">Free Kick</button>
      <button id="btn-nd" class="btn-accent" onclick="openNDModal()">ND</button>
    </div>

    <div style="margin-top: 20px;">
      <h3>General Notes</h3>
      <textarea id="general-notes" rows="4" style="width: 100%; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:10px;" placeholder="Add general assessment notes here..."></textarea>
    </div>
    
    <div style="margin-top:20px;">
      <button class="btn-good" onclick="finishAssessment()">Finish & Export to Excel</button>
    </div>
  </div>
</main>

<div id="modal-event" class="modal" style="display: none;">
  <div class="modal-content">
    <h3 id="event-modal-title">Log Event</h3>
    
    <label>Team:</label>
    <select id="event-team">
      <option value="Home">Home</option>
      <option value="Away">Away</option>
    </select>

    <label>Reason:</label>
    <select id="event-reason">
      </select>

    <div class="event-options">
      <label><input type="checkbox" id="cbx-manage"> Manage</label>
    </div>

    <div class="modal-actions">
      <button onclick="closeEventModal()">Cancel</button>
      <button class="btn-good" onclick="saveStandardEvent()">Log</button>
    </div>
  </div>
</div>

<div id="modal-nd" class="modal" style="display: none;">
  <div class="modal-content">
    <h3>Log Non-Decision (ND)</h3>
    
    <label>Select Team:</label>
    <select id="nd-team">
      <option value="Home">Home</option>
      <option value="Away">Away</option>
    </select>

    <label>Select Type:</label>
    <select id="nd-type" onchange="updateNDOptions()">
      <option value="Penalty">Penalty</option>
      <option value="Free Kick">Free Kick</option>
    </select>

    <label>Reason / Option:</label>
    <select id="nd-reason">
      </select>

    <div class="modal-actions">
      <button onclick="closeNDModal()">Cancel</button>
      <button class="btn-good" onclick="saveNDEvent()">Log ND</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ===================== STATE & DATA ===================== */
let currentMatchEvents = [];
let currentEventType = "";
let matchTimer = "12:34"; // Mock timer for example

const penaltyReasons = ["Tackle", "Offside", "Scrum", "Maul", "Foul Play", "Other"];
const fkReasons = ["Scrum", "Lineout", "Mark", "High Tackle", "Other"];

/* ===================== UI HELPERS ===================== */
function switchTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  event.target.classList.add('active');
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

/* ===================== STANDARD EVENT LOGIC (PEN/FK) ===================== */
function openEventModal(type) {
  currentEventType = type;
  document.getElementById("event-modal-title").innerText = `Log ${type}`;
  
  const reasonSelect = document.getElementById("event-reason");
  reasonSelect.innerHTML = "";
  const options = type === "Penalty" ? penaltyReasons : fkReasons;
  
  options.forEach(opt => {
    const el = document.createElement("option");
    el.value = opt; el.textContent = opt;
    reasonSelect.appendChild(el);
  });

  // Reset checkboxes
  document.getElementById("cbx-manage").checked = false;
  
  document.getElementById("modal-event").style.display = "flex";
}

function closeEventModal() {
  document.getElementById("modal-event").style.display = "none";
}

function saveStandardEvent() {
  const team = document.getElementById("event-team").value;
  const reason = document.getElementById("event-reason").value;
  const isManaged = document.getElementById("cbx-manage").checked;
  
  currentMatchEvents.push({
    time: matchTimer,
    type: currentEventType,
    team: team,
    reason: reason,
    manage: isManaged
  });
  
  closeEventModal();
  showToast(`${currentEventType} Logged (Manage: ${isManaged ? 'Yes' : 'No'})`);
}

/* ===================== NEW ND LOGIC ===================== */
function openNDModal() {
  document.getElementById("modal-nd").style.display = "flex";
  updateNDOptions(); // populate initial reasons
}

function closeNDModal() {
  document.getElementById("modal-nd").style.display = "none";
}

function updateNDOptions() {
  const type = document.getElementById("nd-type").value;
  const reasonSelect = document.getElementById("nd-reason");
  reasonSelect.innerHTML = "";
  
  const options = type === "Penalty" ? penaltyReasons : fkReasons;
  options.forEach(opt => {
    const el = document.createElement("option");
    el.value = opt;
    el.textContent = opt;
    reasonSelect.appendChild(el);
  });
}

function saveNDEvent() {
  const team = document.getElementById("nd-team").value;
  const type = document.getElementById("nd-type").value;
  const reason = document.getElementById("nd-reason").value;
  
  currentMatchEvents.push({
    time: matchTimer, 
    type: `ND ${type}`, 
    team: team, 
    reason: reason,
    manage: false // NDs don't have manage, but we keep structure consistent
  });
  
  closeNDModal();
  showToast(`ND ${type} Logged`);
}

/* ===================== EXCEL EXPORT (SHEETJS) ===================== */
function finishAssessment() {
  // Build a dummy evaluation object based on current state
  const evaluationData = {
    refereeName: "John Doe",
    matchDate: new Date().toISOString().split('T')[0],
    generalNotes: document.getElementById("general-notes").value,
    events: currentMatchEvents
  };
  
  downloadExcel(evaluationData);
}

function downloadExcel(e) {
  // 1. Calculate Stats
  let penCount = 0, fkCount = 0;
  let penManaged = 0, fkManaged = 0;
  let ndPenCount = 0, ndFkCount = 0;

  (e.events || []).forEach(ev => {
    if (ev.type === "Penalty") {
      penCount++;
      if (ev.manage) penManaged++;
    }
    if (ev.type === "Free Kick") {
      fkCount++;
      if (ev.manage) fkManaged++;
    }
    if (ev.type === "ND Penalty") ndPenCount++;
    if (ev.type === "ND Free Kick") ndFkCount++;
  });

  // 2. Build the Worksheet Data (Ensuring ONLY General Notes appear for notes)
  const wsData = [
    ["Referee Assessment Data"],
    [],
    ["Match Details"],
    ["Referee Name", e.refereeName || ""],
    ["Match Date", e.matchDate || ""],
    [],
    ["Match Statistics"],
    ["Total Penalties", penCount],
    ["Penalties Managed", penManaged],
    ["Total Free Kicks", fkCount],
    ["Free Kicks Managed", fkManaged],
    ["ND Penalties", ndPenCount],
    ["ND Free Kicks", ndFkCount],
    [],
    // ONLY General Notes outputted here
    ["General Notes"],
    [e.generalNotes || "No general notes recorded."], 
    [],
    ["Timeline Breakdown"],
    ["Time", "Team", "Event", "Reason", "Managed?"]
  ];

  // Add timeline events
  (e.events || []).forEach(ev => {
    wsData.push([
      ev.time || "", 
      ev.team || "", 
      ev.type || "", 
      ev.reason || "", 
      ev.manage ? "Yes" : "No"
    ]);
  });

  // 3. Generate and Download
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Assessment");
  
  const fname = `${(e.refereeName || "referee").replace(/\s+/g, "_")}_${e.matchDate || "match"}_datasheet.xlsx`;
  XLSX.writeFile(wb, fname);
  showToast("Excel datasheet downloaded");
}
</script>
</body>
</html>
